name: 🔍 Code Quality Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  CACHE_KEY_PREFIX: 'voidix-web'

jobs:
  # 快速检查 - 代码风格和类型检查
  quick-checks:
    name: ⚡ Quick Checks
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🎨 Style Check
        run: |
          echo "🎨 Running Prettier style check..."
          npm run style:check
          echo "✅ Style check passed"

      - name: 📋 Type Check
        run: |
          echo "📋 Running TypeScript type check..."
          npm run type-check
          echo "✅ Type check passed"

  # 质量检测
  quality-analysis:
    name: 📊 Quality Analysis
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🔍 Code Quality Check
        run: |
          echo "🔍 Running comprehensive TypeScript compilation check..."
          npx tsc --noEmit --pretty
          echo "✅ Code quality check passed"

      - name: 📏 Build Verification
        run: |
          echo "📏 Verifying build process..."
          npm run build:basic
          echo "📊 Analyzing build output..."
          ls -la dist/
          du -sh dist/
          echo "✅ Build verification completed"

  # 测试套件
  test-suite:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🧪 Run Tests with Coverage
        run: |
          echo "🧪 Running test suite with coverage..."
          npm run test:coverage
          echo "✅ Tests completed"

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: 📈 Coverage Summary
        if: always()
        run: |
          echo "📈 Test Coverage Summary:"
          if [ -f coverage/lcov.info ]; then
            echo "✅ Coverage report generated successfully"
            grep -o 'Lines.*[0-9]*\.[0-9]*%' coverage/lcov-report/index.html || echo "Coverage details available in artifacts"
          else
            echo "⚠️ Coverage report not found"
          fi

  # 安全检测
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🛡️ Dependency Security Audit
        run: |
          echo "🛡️ Running dependency security scan..."

          echo "📦 Checking for outdated dependencies..."
          npm outdated || echo "Some dependencies may be outdated"

          echo "🔍 Running security audit..."
          npm audit --audit-level=moderate || echo "⚠️ Security audit completed with warnings"

          echo "📜 Checking license compatibility..."
          npx license-checker --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD" --excludePrivatePackages || echo "License check completed"

          echo "✅ Security scan completed"
        continue-on-error: true

  # 最终报告
  final-report:
    name: 📋 Final Report
    runs-on: ubuntu-latest
    needs: [quick-checks, quality-analysis, test-suite, security-scan]
    if: always()

    steps:
      - name: 📊 Pipeline Summary
        run: |
          echo "🎯 Code Quality Pipeline Results"
          echo "================================"
          echo "⚡ Quick Checks: ${{ needs.quick-checks.result }}"
          echo "📊 Quality Analysis: ${{ needs.quality-analysis.result }}"
          echo "🧪 Test Suite: ${{ needs.test-suite.result }}"
          echo "🔒 Security Scan: ${{ needs.security-scan.result }}"
          echo ""

          if [[ "${{ needs.quick-checks.result }}" == "success" &&
                "${{ needs.quality-analysis.result }}" == "success" &&
                "${{ needs.test-suite.result }}" == "success" ]]; then
            echo "🏆 Overall Status: ✅ PASSED"
            echo "✨ Code is ready for deployment"
          else
            echo "🏆 Overall Status: ❌ FAILED"
            echo "⚠️ Some checks require attention"
            exit 1
          fi

          echo ""
          echo "📅 Pipeline completed at: $(date)"
          echo "🔗 Commit: ${GITHUB_SHA:0:8}"
          echo "🌿 Branch: ${GITHUB_REF#refs/heads/}"
